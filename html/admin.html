<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="hdr">
            <nav>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="/">Volver al formulario</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Panel de Administrador</h1>
        <p>Presiona el botón para cargar el contenido del archivo remoto.</p>

        <div class="card">
            <div class="form-group">
                <button class="btn-primary" onclick="cargarArchivo()">Cargar Archivo</button>
            </div>

            <div class="form-group">
                <a href="http://172.233.177.244/descargar/reportes2.txt">
                    <button type="button" class="btn-primary">Descargar reporte</button>
                </a>
            </div>

            <div class="visor-texto">
                <label>Contenido del archivo:</label>
                <div class="pantalla-contenido" id="contenido">El contenido aparecerá aquí...</div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        function cargarArchivo() {
            const url = 'http://172.233.177.244/proyecto2_pasantia/data/reportes2.txt';
            const contenedor = document.getElementById('contenido');

            contenedor.innerText = "Cargando...";

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('No se pudo conectar con el servidor. Código: ' + response.status);
                    }
                    return response.text();
                })
                .then(data => {
                    contenedor.innerText = data;
                })
                .catch(error => {
                    contenedor.innerText = 'Error: ' + error.message +
                        '\n\n[Nota]: Si la IP es correcta, asegúrate de que el servidor tenga CORS habilitado.';
                    console.error('Error detallado:', error);
                });
        }
    </script>
</body>
</html>
