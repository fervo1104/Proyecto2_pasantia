<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=   , initial-scale=1.0">
    <title>Formulario de reportes seguro </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>
    <h1>Formulario de Reporte de Incidente</h1>
    <p>Cueentanos aquí tu problema</p>

    <form id="formulario">
        <label>Nombre completo:</label>
        <input type="text" id="nombre" placeholder="Escribe tu nombre aquí " required>

        <label>Correo Electrónico:</label>
        <textarea id="descripcion" placeholder="Escribe tu correo electrónico" required></textarea>

        <label>Número de teléfono:</label>
        <textarea id="descripcion" placeholder="Número de teléfono" required></textarea>

        <label>Ubicación:</label>
        <input type="text" id="ubicacion" placeholder="Escribe a dirreción del incidente" required>

        <label>Descripción del reporte:</label>
        <textarea id="descripcion" placeholder="Describe el incidente" required></textarea>

        <button type="submit">Enviar reporte</button>
    </form>

    <p id="mensaje"></p>

    <script type="module" src="prueba.js"></script></h1>
    
</body>
</html>
