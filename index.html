<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=   , initial-scale=1.0">
    <title>Formulario de reportes seguro </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>
    <h1>Formulario de Reporte de Incidente</h1>

    <form id="formulario">
        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>

        <label>Descripción del incidente:</label>
        <textarea id="descripcion" placeholder="Describe el incidente" required></textarea>

        <label>Ubicación:</label>
        <input type="text" id="ubicacion" placeholder="Dirección o lugar" required>

        <button type="submit">Enviar reporte</button>
    </form>

    <p id="mensaje"></p>

    <script type="module" src="prueba.js"></script></h1>
    
</body>
</html>
