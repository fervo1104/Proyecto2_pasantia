<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Reporte</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Formulario de Reporte de Incidente</h1>
        <p>Cuéntanos aquí tu problema</p>

        <div class="card">
            <form id="formulario">
                <div class="form-group">
                    <label class="form-respond">Nombre completo:</label>
                    <input type="text" id="nombre" placeholder="Escribe tu nombre aquí" required class="input-field">
                </div>

                <div class="form-group">
                    <label class="form-respond">Correo Electrónico:</label>
                    <textarea id="correo" placeholder="Escribe tu correo electrónico" required
                        class="input-field"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-respond">Número de teléfono:</label>
                    <textarea id="telefono" placeholder="Número de teléfono" required class="input-field"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-respond">Ubicación:</label>
                    <input type="text" id="ubicacion" placeholder="Escribe la dirección del incidente" required
                        class="input-field">
                </div>

                <div class="form-group">
                    <label class="form-respond">Descripción del reporte:</label>
                    <textarea id="descripcion" placeholder="Describe el incidente" required
                        class="input-field"></textarea>
                </div>

                <button type="submit" class="btn-primary">Enviar reporte</button>
            </form>
        </div>
    </div>

    <p id="mensaje"></p>
    <script type="module" src="prueba.js"></script>
</body>

</html>
